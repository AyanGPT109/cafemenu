<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - Sip & Sprout Cafe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="/admin-styles.css" />
  <style>
    .order-card.pending {
      border-left: 4px solid #e53935;
    }

    .order-card.preparing {
      border-left: 4px solid #fb8c00;
    }

    .order-card.done {
      border-left: 4px solid #43a047;
    }

    .order-status.pending {
      background: #ffebee;
      color: #c62828;
    }

    .order-status.preparing {
      background: #fff3e0;
      color: #ef6c00;
    }

    .order-status.done {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status-btn {
      border: 0;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      margin-left: 8px;
      padding: 6px 10px;
    }

    .status-btn.preparing {
      background: #fb8c00;
    }

    .status-btn.done {
      background: #43a047;
    }
  </style>
</head>
<body>
  <div class="ambient ambient--left"></div>
  <div class="ambient ambient--right"></div>

  <header class="admin-header">
    <div class="admin-header__content">
      <h1>Admin Portal</h1>
      <p class="admin-header__subtitle">Order Management - FCFO (First Come, First Out)</p>
      <div class="admin-stats">
        <div class="stat-card">
          <span class="stat-number" id="totalOrders">0</span>
          <span class="stat-label">Total Orders</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="pendingOrders">0</span>
          <span class="stat-label">Pending</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="completedOrders">0</span>
          <span class="stat-label">Completed</span>
        </div>
      </div>
    </div>
    <div class="admin-header__actions">
      <button class="refresh-btn" id="refreshBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M23 4V10H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M1 20V14H7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3.51 9C4.15879 7.82345 5.06731 6.80846 6.17221 6.03055C7.27711 5.25264 8.54545 4.73028 9.87986 4.50324C11.2143 4.27621 12.5817 4.3504 13.8823 4.7204C15.1829 5.0904 16.3827 5.74664 17.39 6.64001L23 10M1 14L6.6 17.36C7.60734 18.2534 8.80713 18.9096 10.1077 19.2796C11.4083 19.6496 12.7757 19.7238 14.1101 19.4968C15.4446 19.2697 16.7129 18.7474 17.8178 17.9695C18.9227 17.1915 19.8312 16.1766 20.48 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Refresh
      </button>
      <button class="clear-all-btn" id="clearAllBtn">Clear All Orders</button>
    </div>
  </header>

  <main class="admin-layout">
    <section class="orders-section">
      <div class="section-header">
        <h2>Orders Queue</h2>
        <div class="bulk-actions">
          <button class="bulk-delete-btn" id="bulkDeleteBtn" style="display: none;">Delete Selected Items</button>
        </div>
        <div class="filter-controls">
          <select class="filter-select" id="statusFilter">
            <option value="all">All Orders</option>
            <option value="pending">Pending</option>
            <option value="preparing">Preparing</option>
            <option value="done">Done</option>
          </select>
        </div>
      </div>

      <div class="orders-container" id="ordersContainer">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 2C9.55228 2 10 2.44772 10 3C10 3.55228 9.55228 4 9 4C8.44772 4 8 3.55228 8 3C8 2.44772 8.44772 2 9 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20 2C20.5523 2 21 2.44772 21 3C21 3.55228 20.5523 4 20 4C19.4477 4 19 3.55228 19 3C19 2.44772 19.4477 2 20 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M1 1H5L7.68 14.39C7.77144 14.8504 8.02191 15.264 8.38755 15.5583C8.75318 15.8526 9.2107 16.009 9.68 16H19.4C19.8693 16.009 20.3268 15.8526 20.6925 15.5583C21.0581 15.264 21.3086 14.8504 21.4 14.39L23 6H6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <h3>No orders yet</h3>
          <p>Orders will appear here when customers place them</p>
        </div>
      </div>
    </section>

    <section class="orders-section" style="margin-top: 24px;">
      <div class="section-header">
        <h2>Menu Control</h2>
        <p style="margin: 0; opacity: 0.75;">Update price, stock, and availability in real-time.</p>
      </div>
      <div class="orders-container" id="menuControlContainer">
        <div class="empty-state">
          <h3>Loading menu...</h3>
          <p>Please wait.</p>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/admin.js"></script>
</body>
</html>
